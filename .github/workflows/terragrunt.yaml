name: Terragrunt

on:
  push:
    branches: [main]
    paths:
      - 'terragrunt/**'
      - 'env.hcl'
      - 'region.hcl'
  pull_request:
    branches: [main]
    paths:
      - 'terragrunt/**'
      - 'env.hcl'
      - 'region.hcl'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terragrunt:
    name: Terragrunt ${{ github.event.inputs.action || (github.event_name == 'push' && 'apply') || 'plan' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/105849575222/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: terraform-sa@shoshone-devops-platform.iam.gserviceaccount.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v1.0.0/terragrunt_linux_amd64" -O /tmp/terragrunt
          chmod +x /tmp/terragrunt
          sudo mv /tmp/terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt Plan
        if: github.event_name == 'pull_request' || github.event.inputs.action == 'plan'
        run: terragrunt run --all plan --working-dir terragrunt/gcp/dev --non-interactive
        
      - name: Terragrunt Apply
        if: github.event_name == 'push' || github.event.inputs.action == 'apply'
        run: terragrunt run --all apply --working-dir terragrunt/gcp/dev --non-interactive

      - name: Terragrunt Destroy
        if: github.event.inputs.action == 'destroy'
        run: terragrunt run --all destroy --working-dir terragrunt/gcp/dev --non-interactive
