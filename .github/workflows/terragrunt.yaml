name: GCP Dev — Terragrunt

on:
  push:
    branches: [main]
    paths:
      - 'terragrunt/**'
      - 'env.hcl'
      - 'region.hcl'
  pull_request:
    branches: [main]
    paths:
      - 'terragrunt/**'
      - 'env.hcl'
      - 'region.hcl'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terragrunt-gcp-dev
  cancel-in-progress: false

jobs:
  plan:
    name: GCP Dev — Plan
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'destroy'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-terragrunt
      - name: Terragrunt Plan
        run: terragrunt run --all plan --working-dir terragrunt/gcp/dev --non-interactive

  apply:
    name: GCP Dev — Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-terragrunt
      - name: Terragrunt Apply
        run: terragrunt run --all apply --working-dir terragrunt/gcp/dev --non-interactive

  destroy:
    name: GCP Dev — Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-terragrunt
      - name: Terragrunt Destroy
        run: terragrunt run --all destroy --working-dir terragrunt/gcp/dev --non-interactive
