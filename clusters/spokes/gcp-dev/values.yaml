# GCP dev spoke — override only what differs from _template defaults
clusterName: gcp-dev
environment: dev
cloud: gcp
region: us-central1

# GCP specific
gcpProjectID: "your-gcp-project-id"   # replace with real value

cilium:
  k8sServiceHost: "10.96.0.1"         # replace with real API server IP

# Dev cluster — smaller footprint
prometheus:
  prometheus:
    prometheusSpec:
      replicas: 1
      retention: 1h
      retentionSize: "4GB"
