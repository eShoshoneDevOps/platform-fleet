{{- if eq .Values.cloud "aws" }}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.region }}
      # Uses pod identity — no static credentials
      # This is the ACK pod identity pattern you already use at work
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets-system
{{- end }}
{{- if eq .Values.cloud "gcp" }}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-store
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.gcpProjectID | default "" }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.region }}
          clusterName: {{ .Values.clusterName }}
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets-system
{{- end }}
