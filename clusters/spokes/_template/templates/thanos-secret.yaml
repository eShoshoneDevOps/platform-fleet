apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: thanos-objstore-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    # Points to the SecretStore for this cluster's cloud provider
    # aws-dev uses AWS SM, gcp-dev uses GCP SM
    name: {{ .Values.cloud }}-secret-store
    kind: ClusterSecretStore
  target:
    name: thanos-objstore-secret
    creationPolicy: Owner
  data:
  - secretKey: objstore.yml
    remoteRef:
      # Secret path follows convention: platform/<cluster>/thanos-objstore
      key: platform/{{ .Values.clusterName }}/thanos-objstore
