apiVersion: v2
name: spoke-baseline
description: Baseline configuration deployed to every spoke cluster
type: application
version: 0.1.0
appVersion: "1.0.0"

# These are the addons every spoke gets
# Versions pinned — never float on latest in production
dependencies:
- name: cilium
  version: "1.15.3"
  repository: https://helm.cilium.io
  condition: cilium.enabled

- name: external-secrets
  version: "0.9.13"
  repository: https://charts.external-secrets.io
  condition: externalSecrets.enabled

- name: kyverno
  version: "3.1.4"
  repository: https://kyverno.github.io/kyverno
  condition: kyverno.enabled

- name: prometheus
  version: "25.8.0"
  repository: https://prometheus-community.github.io/helm-charts
  condition: prometheus.enabled
